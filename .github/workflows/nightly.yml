name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC every night
  workflow_dispatch:        # allow manual runs

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------------------
      # Checkout & AWS auth
      # ---------------------------------------------------------------

      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ---------------------------------------------------------------
      # Step 1 — Launch temporary EC2 instance
      # ---------------------------------------------------------------

      - name: Get GitHub Actions runner public IP
        id: runner-ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Open SSH in security group for runner
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.EC2_SG_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" || true

      - name: Write SSH private key to disk
        run: |
          echo "${{ secrets.QA_EC2_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Resolve latest Amazon Linux 2023 AMI
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners amazon \
            --filters "Name=name,Values=al2023-ami-2023*-kernel-*-x86_64" \
                      "Name=state,Values=available" \
            --query "sort_by(Images, &CreationDate)[-1].ImageId" \
            --output text)
          echo "id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Using AMI: $AMI_ID"

      - name: Launch temp EC2 instance
        id: launch
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id            "${{ steps.ami.outputs.id }}" \
            --instance-type       t3.small \
            --key-name            "${{ secrets.EC2_KEY_NAME }}" \
            --security-group-ids  "${{ secrets.EC2_SG_ID }}" \
            --subnet-id           "${{ secrets.EC2_SUBNET_ID }}" \
            --associate-public-ip-address \
            --user-data           file://ec2-temp/user-data.sh \
            --tag-specifications  'ResourceType=instance,Tags=[{Key=Name,Value=cs686-nightly-temp},{Key=ManagedBy,Value=github-actions}]' \
            --query               'Instances[0].InstanceId' \
            --output              text)

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Launched: $INSTANCE_ID"

      - name: Wait for instance to be running
        run: |
          aws ec2 wait instance-running \
            --instance-ids "${{ steps.launch.outputs.instance_id }}"

      - name: Get instance public IP
        id: ec2-ip
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids "${{ steps.launch.outputs.instance_id }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Instance IP: $IP"

      # ---------------------------------------------------------------
      # Step 2 — Deploy source repo to temp instance
      # ---------------------------------------------------------------

      - name: Wait for SSH to become available
        run: |
          echo "Polling SSH on ${{ steps.ec2-ip.outputs.ip }}..."
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=5 \
                -i /tmp/ssh_key \
                ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
                exit 0 2>/dev/null && echo "SSH ready after attempt $i" && exit 0
            echo "  Attempt $i/30 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "ERROR: SSH never became available" && exit 1

      - name: Wait for Docker to be ready on instance
        run: |
          for i in $(seq 1 12); do
            ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
                ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
                'docker info > /dev/null 2>&1' && echo "Docker ready" && exit 0
            echo "  Attempt $i/12 — Docker not ready yet, waiting 10s..."
            sleep 10
          done
          echo "ERROR: Docker never became ready" && exit 1

      - name: Clone source repo on instance
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
              "git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ secrets.SOURCE_REPO }} ~/app"

      - name: Write .env file and copy to instance
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          INSTANCE_IP: ${{ steps.ec2-ip.outputs.ip }}
        run: |
          {
            echo "DB_HOST=$DB_HOST"
            echo "DB_USER=$DB_USER"
            echo "DB_PASSWORD=$DB_PASSWORD"
            echo "DB_NAME=$DB_NAME"
            echo "NODE_ENV=production"
            echo "REACT_APP_API_URL=http://${INSTANCE_IP}/api"
          } > /tmp/app.env

          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              /tmp/app.env \
              ec2-user@"${INSTANCE_IP}":~/app/.env

      - name: Build and start application
        # Building the React image takes a few minutes on t3.small — 10 min timeout
        timeout-minutes: 15
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
              "cd ~/app && docker compose up --build -d"

      - name: Wait for application to be ready
        run: |
          echo "Waiting for http://localhost/api/getArticles to respond..."
          for i in $(seq 1 18); do
            CODE=$(ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
                ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
                "curl -s -o /dev/null -w '%{http_code}' http://localhost/api/getArticles" 2>/dev/null)
            echo "  Attempt $i/18 — HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "App is ready!"
              exit 0
            fi
            sleep 10
          done
          echo "App did not become ready in time — showing logs for diagnosis"

      - name: Show container logs (always)
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
              "cd ~/app && echo '=== .env contents ===' && cat .env && echo '=== docker compose ps ===' && docker compose ps && echo '=== backend logs ===' && docker compose logs --tail=60 backend"

      # ---------------------------------------------------------------
      # Step 3 — Smoke tests
      # Runs on the instance itself via SSH so no extra ports need opening.
      # The smoke-test.sh is already in the cloned repo at ~/app/smoke-test.sh.
      # ---------------------------------------------------------------

      - name: Run smoke tests on instance
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ec2-user@"${{ steps.ec2-ip.outputs.ip }}" \
              "bash ~/app/smoke-test.sh http://localhost"

      # ---------------------------------------------------------------
      # Step 4 — Build and push images to ECR
      # Built on the runner (which already has AWS credentials).
      # Pushes backend and frontend as separately tagged images.
      # ---------------------------------------------------------------

      - name: Clone source repo on runner
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ secrets.SOURCE_REPO }} /tmp/app-source

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" | \
            docker login --username AWS --password-stdin \
            "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

      - name: Build and push images to ECR
        id: ecr-push
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
          QA_EC2_HOST: ${{ secrets.QA_EC2_HOST }}
        run: |
          DATE="$(date +%Y%m%d)"
          ECR="${AWS_ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          BACKEND_URI="${ECR}/${ECR_REPO}:backend-${DATE}"
          FRONTEND_URI="${ECR}/${ECR_REPO}:frontend-${DATE}"

          # Backend (no build args needed)
          docker build --target backend -t "${BACKEND_URI}" /tmp/app-source
          docker push "${BACKEND_URI}"

          # Frontend — bake in the QA host's API URL
          docker build --target frontend \
            --build-arg REACT_APP_API_URL="http://${QA_EC2_HOST}/api" \
            -t "${FRONTEND_URI}" /tmp/app-source
          docker push "${FRONTEND_URI}"

          echo "backend_uri=${BACKEND_URI}" >> "$GITHUB_OUTPUT"
          echo "frontend_uri=${FRONTEND_URI}" >> "$GITHUB_OUTPUT"
          echo "Pushed backend:  ${BACKEND_URI}"
          echo "Pushed frontend: ${FRONTEND_URI}"

      # ---------------------------------------------------------------
      # Step 5 — Deploy to QA EC2
      # ---------------------------------------------------------------

      - name: Write QA .env and docker-compose to QA EC2
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          BACKEND_IMAGE: ${{ steps.ecr-push.outputs.backend_uri }}
          FRONTEND_IMAGE: ${{ steps.ecr-push.outputs.frontend_uri }}
          QA_HOST: ${{ secrets.QA_EC2_HOST }}
        run: |
          {
            echo "DB_HOST=$DB_HOST"
            echo "DB_USER=$DB_USER"
            echo "DB_PASSWORD=$DB_PASSWORD"
            echo "DB_NAME=$DB_NAME"
            echo "NODE_ENV=production"
            echo "BACKEND_IMAGE=$BACKEND_IMAGE"
            echo "FRONTEND_IMAGE=$FRONTEND_IMAGE"
          } > /tmp/qa.env

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ec2-user@"${QA_HOST}" 'mkdir -p ~/app'

          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              /tmp/qa.env ec2-user@"${QA_HOST}":~/app/.env

          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              qa/docker-compose.yml ec2-user@"${QA_HOST}":~/app/docker-compose.yml

      - name: Pull and restart on QA EC2
        env:
          AWS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          QA_HOST: ${{ secrets.QA_EC2_HOST }}
        run: |
          ECR="${AWS_ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

          # Write a deploy script so credentials aren't embedded in SSH argv
          {
            echo '#!/bin/bash'
            echo 'set -e'
            echo "export AWS_ACCESS_KEY_ID='${AWS_KEY_ID}'"
            echo "export AWS_SECRET_ACCESS_KEY='${AWS_SECRET}'"
            echo "export AWS_SESSION_TOKEN='${AWS_TOKEN}'"
            echo "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | \\"
            echo "  docker login --username AWS --password-stdin '${ECR}'"
            echo 'cd ~/app'
            echo 'docker compose pull'
            echo 'docker compose up -d'
            echo 'rm -- "$0"'
          } > /tmp/qa-deploy.sh

          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              /tmp/qa-deploy.sh ec2-user@"${QA_HOST}":~/qa-deploy.sh

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ec2-user@"${QA_HOST}" 'bash ~/qa-deploy.sh'

      - name: QA health check
        run: |
          echo "Polling QA at ${{ secrets.QA_EC2_HOST }}..."
          for i in $(seq 1 12); do
            CODE=$(ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
                ec2-user@"${{ secrets.QA_EC2_HOST }}" \
                "curl -s -o /dev/null -w '%{http_code}' http://localhost/api/getArticles" 2>/dev/null)
            echo "  Attempt $i/12 — HTTP $CODE"
            [ "$CODE" = "200" ] && echo "QA is healthy" && exit 0
            sleep 10
          done
          echo "ERROR: QA health check failed" && exit 1

      # ---------------------------------------------------------------
      # Step 6 — Cleanup — always runs, even on failure
      # ---------------------------------------------------------------

      - name: Terminate temp instance
        if: always()
        run: |
          INSTANCE_ID="${{ steps.launch.outputs.instance_id }}"
          if [ -n "$INSTANCE_ID" ]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
            echo "Terminated $INSTANCE_ID"
          else
            echo "No instance to terminate"
          fi

      - name: Revoke SSH security group rule for runner
        if: always()
        run: |
          RUNNER_IP="${{ steps.runner-ip.outputs.ip }}"
          if [ -z "$RUNNER_IP" ]; then exit 0; fi
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.EC2_SG_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32" || true
          echo "Security group rule revoked for $RUNNER_IP"
